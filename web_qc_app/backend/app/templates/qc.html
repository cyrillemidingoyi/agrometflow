<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QC Studio - Quality Control</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">AgrometFlow QC Studio</p>
      <h1>Quality Control</h1>
      <p class="subtitle">Run all available QC functions test-by-test or as a full pipeline.</p>
      <nav class="nav-tabs">
        <a class="tab" href="/data">Data</a>
        <a class="tab active" href="/qc">Quality Control</a>
        <a class="tab" href="/outputs">Outputs</a>
      </nav>
    </header>

    <section class="panel">
      <h2>Run Tests</h2>
      <div class="grid-3">
        <div class="field">
          <label>Dataset ID</label>
          <input id="datasetId" type="text" readonly />
        </div>
        <div class="field">
          <label>Frequency</label>
          <select id="frequency">
            <option value="daily">daily</option>
            <option value="subdaily">subdaily</option>
            <option value="auto">auto</option>
          </select>
        </div>
        <div class="field">
          <label>Station column</label>
          <input id="stationCol" type="text" value="station" />
        </div>
      </div>
      <div class="field">
        <label>Variables (comma-separated)</label>
        <input id="variables" type="text" placeholder="Tx,Tn,rr,ta,w,dd" />
      </div>

      <h3>Available QC functions</h3>
      <div id="testsContainer" class="tests-grid"></div>

      <details class="wmo-box">
        <summary>WMO Gross Errors parameters</summary>
        <div class="grid-4">
          <div class="field"><label>Input column</label><input id="wmoInput" type="text" placeholder="Tn" /></div>
          <div class="field">
            <label>WMO code</label>
            <select id="wmoCode">
              <option value="ta">ta</option>
              <option value="td">td</option>
              <option value="mslp">mslp</option>
              <option value="p">p</option>
              <option value="w">w</option>
            </select>
          </div>
          <div class="field"><label>Latitude column</label><input id="wmoLatCol" type="text" placeholder="lat" /></div>
          <div class="field"><label>Latitude constant</label><input id="wmoLat" type="number" step="0.01" placeholder="12.5" /></div>
        </div>
      </details>

      <button id="runQcBtn" class="btn primary">Run selected tests</button>
    </section>

    <section class="panel">
      <h2>QC Results</h2>
      <div id="qcSummary" class="meta"></div>
      <div class="table-wrap"><table id="qcTable"></table></div>
    </section>

    <p id="status" class="status">Ready.</p>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/qc.js"></script>
</body>
</html>
