# Example configuration for agrometflow.dataquality.qc.run_qc_pipeline_from_config
# Adapt paths, variables and units to your station dataset.

station_id: "station_demo"

# CSV input path (daily or subdaily)
data: "data/input/meteo_daily.csv"

# auto | daily | subdaily
frequency: "daily"

# Optional output directory for intermediate qc_*.txt files
outpath: "data/qc/intermediate"

# Date/time column mapping in your CSV
columns:
  year: "Year"
  month: "Month"
  day: "Day"
  hour: "Hour"
  minute: "Minute"

# Variables to process (must exist as CSV columns)
variable_cols:
  - "Tx"
  - "Tn"
  - "rr"
  - "w"
  - "dd"
  - "sd"
  - "fs"

# Units per variable (used for canonical conversion before QC tests)
units_map:
  Tx: "C"
  Tn: "C"
  rr: "mm"
  w: "m/s"
  dd: "deg"
  sd: "cm"
  fs: "cm"

# Optional custom test parameters (keys map to function args)
tests:
  climatic_outliers:
    iqr: 3
  daily_out_of_range:
    tmax_upper: 45
    tmax_lower: -30
    tmin_upper: 30
    tmin_lower: -40
    rr_upper: 200
    rr_lower: 0
    w_upper: 30
    w_lower: 0
    dd_upper: 360
    dd_lower: 0
    sd_upper: 200
    sd_lower: 0
    fs_upper: 100
    fs_lower: 0
  temporal_coherence:
    temp_jumps: 20
    windspeed_jumps: 15
    snowdepth_jumps: 50
  daily_repetition:
    n: 4
  subdaily_out_of_range:
    time_offset: 0
    ta_day_upper: 45
    ta_day_lower: -35
    ta_night_upper: 40
    ta_night_lower: -40
  subdaily_repetition:
    n: 6

# Optional exports generated by run_qc_pipeline_from_config
outputs:
  summary_csv: "data/qc/summary.csv"
  flags_csv: "data/qc/all_flags.csv"
